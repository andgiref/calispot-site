<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karuanas — Email Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-700: #2D6A4F;
      --green-50: #F0FDF4;
      --gray-900: #111827;
      --gray-500: #6B7280;
      --gray-400: #9CA3AF;
      --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--green-50);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: var(--green-700);
      color: var(--white);
      font-size: 1rem;
      font-weight: 700;
      padding: 0.875rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .hint {
      font-size: 0.8rem;
      color: var(--gray-500);
      margin-top: 1.5rem;
      margin-bottom: 0;
    }
    .home-link {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--gray-400);
      text-decoration: none;
    }
    .home-link:hover {
      color: var(--green-700);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your account is now active. Open Karuanas and log in to start exploring.</p>
    <a href="karuanas://" class="btn">Open Karuanas</a>
    <p class="hint">If the button doesn't work, open the app manually.</p>
    <a href="index.html" class="home-link">← karuanas.eu</a>
  </div>
</body>
</html>
